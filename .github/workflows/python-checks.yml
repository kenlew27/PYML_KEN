name: Python Checks

on:
  push:
    branches:
      - main
      - prod
  pull_request:
    branches:
      - main
      - prod

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint mypy pytest

      - name: Run pylint
        run: |
          pylint --disable=C0114,C0116,C0303,W1514 app.py tests/

      - name: Run mypy
        run: |
          mypy .

      - name: Run pytest
        run: |
          pytest tests
